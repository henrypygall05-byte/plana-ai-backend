# Render Blueprint for Plana.AI Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: plana-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    # --workers 1: Required. The in-process background worker uses module-level
    # state and SQLite, which break with multiple forked processes.
    startCommand: uvicorn plana.api.app:create_app --factory --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PLANA_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  - type: worker
    name: plana-document-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m plana.documents.worker --loop --interval 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PLANA_ENV
        value: production
    autoDeploy: true
